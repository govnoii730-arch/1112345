{% extends "base.html" %}
{% block title %}Вход — CloudVisuals{% endblock %}
{% block content %}
<section class="form card">
    <h2>Вход в аккаунт</h2>
    <p class="muted">После входа можно сразу купить тариф и получить ключ.</p>
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
        <div class="field">
            <label>Ник или почта</label>
            <input name="username_or_email" required>
        </div>
        <div class="field">
            <label>Пароль</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="/register">Регистрация</a></p>
</section>
{% endblock %}
